<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#12b82b" />
      <stop offset="1" stop-color="#0e992e" />
    </linearGradient>
  </defs>
  <rect rx="20" width="200" height="200" fill="#f6f9fc" />
  <g transform="translate(20,20)">
    <circle cx="60" cy="50" r="28" fill="url(#g)"></circle>
    <rect x="34" y="86" width="52" height="44" rx="10" fill="#fff" stroke="#e6f4ea" />
    <g transform="translate(0,0)">
      <text x="60" y="140" font-family="Segoe UI, Roboto, Arial" font-size="18" fill="#0E992E" font-weight="700" text-anchor="middle">Dr.</text>
      <text x="60" y="160" font-family="Segoe UI, Roboto, Arial" font-size="12" fill="#0b6b1a" text-anchor="middle">AI</text>
    </g>
  </g>
  <style>
    circle { transform-origin: 60px 50px; animation: beat 1.2s infinite ease-in-out; }
    @keyframes beat { 0% { transform: scale(1); } 50% { transform: scale(1.06); } 100% { transform: scale(1); } }
  </style>
</svg>