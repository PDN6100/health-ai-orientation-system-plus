version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - ml_flask
    networks:
      - app-network

  ml_flask:
    build: ./ml_flask
    ports:
      - "5000:5000"
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
